<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#040410">
  <title>VEXA</title>
  <style>
    :root {
      --c-idle:   #00d4ff;
      --c-listen: #00ff9d;
      --c-think:  #ffaa00;
      --c-speak:  #b060ff;
      --c-stop:   #ff4466;
      --bg:       #040410;
      --glass:    rgba(255,255,255,0.04);
      --glass2:   rgba(255,255,255,0.07);
      --border:   rgba(0,212,255,0.15);
      --text:     #c8d8f0;
      --dim:      #3a5070;
      --mid:      #6a8aaa;
      --accent:   var(--c-idle);
      --font:     'Courier New', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

    /* Starfield bg */
    #bg { position: fixed; inset: 0; opacity: 0.3; pointer-events: none; }

    .app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100dvh; padding: 0;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(4,4,16,0.9);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }
    .logo { font-size: 1.3rem; font-weight: 900; letter-spacing: 5px; }
    .logo span:first-child { color: var(--accent); text-shadow: 0 0 16px var(--accent); }
    .logo span:last-child  { color: var(--text); }

    .state-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 14px; border-radius: 100px;
      border: 1px solid rgba(0,212,255,0.25);
      background: var(--glass2);
    }
    .state-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.4} }
    .state-text { font-size: 0.65rem; letter-spacing: 2px; color: var(--accent); }

    .ws-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--c-stop); transition: background 0.3s;
    }
    .ws-dot.ok { background: var(--c-listen); box-shadow: 0 0 5px var(--c-listen); }

    /* ── Chat ── */
    .chat-box {
      flex: 1; overflow-y: auto;
      padding: 14px 14px 0;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-box::-webkit-scrollbar { display: none; }

    .msg { border-radius: 12px; padding: 10px 14px; font-size: 0.85rem; line-height: 1.55; max-width: 88%; }
    .msg.user {
      align-self: flex-end;
      background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2);
      color: var(--c-idle); border-bottom-right-radius: 3px;
    }
    .msg.vexa {
      align-self: flex-start;
      background: var(--glass2); border: 1px solid var(--border);
      color: var(--text); border-bottom-left-radius: 3px;
    }
    .msg.vexa::before {
      content: 'VEXA'; display: block; font-size: 0.55rem;
      letter-spacing: 3px; color: var(--accent); margin-bottom: 5px;
      text-shadow: 0 0 8px var(--accent);
    }
    .msg.sys {
      align-self: center; color: var(--dim); font-size: 0.68rem;
      font-style: italic; background: none; border: none; text-align: center;
    }

    /* ── Mic button ── */
    .mic-wrap {
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 0 6px; flex-shrink: 0;
    }
    .mic-btn {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--glass2); border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; touch-action: manipulation;
      transition: all 0.2s; box-shadow: 0 0 20px rgba(0,212,255,0.15);
    }
    .mic-btn svg { width: 28px; height: 28px; fill: var(--accent); transition: fill 0.2s; }
    .mic-btn:active { transform: scale(0.93); }
    .mic-btn.recording {
      background: rgba(0,255,157,0.12); border-color: var(--c-listen);
      box-shadow: 0 0 30px rgba(0,255,157,0.4);
      animation: mic-pulse 0.7s infinite;
    }
    .mic-btn.recording svg { fill: var(--c-listen); }
    @keyframes mic-pulse {
      0%,100% { box-shadow: 0 0 20px rgba(0,255,157,0.3); }
      50%     { box-shadow: 0 0 45px rgba(0,255,157,0.6); }
    }
    .interim {
      min-height: 18px; font-size: 0.75rem; color: var(--c-listen);
      letter-spacing: 1px; text-align: center; padding: 4px 16px;
    }

    /* ── Input ── */
    .input-area { padding: 10px 12px; flex-shrink: 0; }
    .input-wrap {
      display: flex; align-items: center; gap: 8px;
      background: var(--glass2); border: 1px solid rgba(0,212,255,0.2);
      border-radius: 100px; padding: 4px 6px 4px 18px;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    .text-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: var(--font); font-size: 0.85rem;
    }
    .text-input::placeholder { color: var(--dim); }
    .send-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: var(--accent); color: var(--bg); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation; box-shadow: 0 0 12px rgba(0,212,255,0.3);
      flex-shrink: 0;
    }

    /* ── Quick actions ── */
    .quick-row {
      display: flex; gap: 7px; overflow-x: auto; padding: 0 12px 12px;
      flex-shrink: 0;
    }
    .quick-row::-webkit-scrollbar { display: none; }
    .qbtn {
      flex-shrink: 0;
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 100px; color: var(--mid);
      font-family: var(--font); font-size: 0.65rem;
      letter-spacing: 2px; padding: 7px 14px; cursor: pointer;
      touch-action: manipulation; white-space: nowrap;
      transition: all 0.2s;
    }
    .qbtn:active { border-color: var(--accent); color: var(--accent); }

    /* ── Status bar ── */
    .statusbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 16px 10px;
      font-size: 0.62rem; color: var(--dim); flex-shrink: 0;
    }

    /* Estado dinámico */
    .app[data-state="IDLE"]       { --accent: var(--c-idle);   }
    .app[data-state="LISTENING"]  { --accent: var(--c-listen); }
    .app[data-state="THINKING"]   { --accent: var(--c-think);  }
    .app[data-state="SPEAKING"]   { --accent: var(--c-speak);  }
    .app[data-state="PC_CONTROL"] { --accent: var(--c-idle);   }
    .app[data-state="AGENT"]      { --accent: #ff6b35;          }
  </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="app" id="app" data-state="IDLE">

  <div class="topbar">
    <div class="logo"><span>V</span><span>EXA</span></div>
    <div class="state-pill">
      <div class="state-dot"></div>
      <span class="state-text" id="state-text">OFFLINE</span>
    </div>
    <div class="ws-dot" id="ws-dot"></div>
  </div>

  <div class="chat-box" id="chat-box">
    <div class="msg sys">Conectando a VEXA...</div>
  </div>

  <div class="mic-wrap">
    <div class="mic-btn" id="mic-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/>
        <path d="M19 11a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.92V20H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-2.08A7 7 0 0 0 19 11z"/>
      </svg>
    </div>
    <div class="interim" id="interim"></div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="text-input" class="text-input"
             placeholder="Escribe un mensaje..." autocomplete="off" spellcheck="false"/>
      <button class="send-btn" id="send-btn">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
          <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="quick-row">
    <button class="qbtn" onclick="send('modo chat')">CHAT</button>
    <button class="qbtn" onclick="send('modo pc')">PC</button>
    <button class="qbtn" onclick="send('modo agente')">AGENTE</button>
    <button class="qbtn" onclick="send('estado del sistema')">ESTADO</button>
    <button class="qbtn" onclick="send('para')">STOP</button>
    <button class="qbtn" onclick="send('qué dice en la pantalla')">PANTALLA</button>
  </div>

  <div class="statusbar">
    <span id="ws-status">desconectado</span>
    <span id="ip-info"></span>
  </div>

</div>

<script>
// Starfield bg
(function() {
  const c = document.getElementById("bg");
  const cx = c.getContext("2d");
  let W, H, s = [];
  function resize() {
    W = c.width = window.innerWidth; H = c.height = window.innerHeight;
    s = Array.from({length:80}, () => ({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2,a:Math.random()*0.5+0.1,v:Math.random()*0.4+0.05}));
  }
  resize(); window.addEventListener("resize", resize);
  function draw() {
    cx.clearRect(0,0,W,H);
    s.forEach(p=>{ cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2); cx.fillStyle=`rgba(180,220,255,${p.a.toFixed(2)})`; cx.fill(); });
    requestAnimationFrame(draw);
  }
  draw();
})();

const HOST     = window.location.hostname;
const IS_HTTPS = window.location.protocol === "https:";
const API_URL  = IS_HTTPS ? `https://${HOST}:8443` : `http://${HOST}:8765`;
const WS_URL   = IS_HTTPS ? `wss://${HOST}:8767`   : `ws://${HOST}:8766`;

document.getElementById("ip-info").textContent = HOST;

const STATE_LABELS = {
  IDLE:"EN ESPERA", LISTENING:"ESCUCHANDO", THINKING:"PROCESANDO",
  SPEAKING:"HABLANDO", PC_CONTROL:"MODO PC", AGENT:"AGENTE"
};

function setUIState(s) {
  document.getElementById("state-text").textContent = STATE_LABELS[s] || s;
  document.getElementById("app").dataset.state = s;
}

function addMsg(text, type="vexa") {
  const box = document.getElementById("chat-box");
  const el  = document.createElement("div");
  el.className = `msg ${type}`;
  el.textContent = text;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
  while (box.children.length > 40) box.firstChild.remove();
}

async function send(cmd) {
  if (!cmd.trim()) return;
  addMsg(cmd, "user");
  try {
    await fetch(`${API_URL}/command`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({command: cmd})
    });
  } catch(e) { addMsg("Error. ¿VEXA está activa?", "sys"); }
}

// Texto
const textInput = document.getElementById("text-input");
document.getElementById("send-btn").addEventListener("click", () => {
  const v = textInput.value.trim(); if (!v) return;
  textInput.value = ""; send(v);
});
textInput.addEventListener("keydown", e => { if (e.key==="Enter") { e.preventDefault(); const v=textInput.value.trim(); if(v){textInput.value="";send(v);} } });

// Micrófono
const micBtn = document.getElementById("mic-btn");
const interim = document.getElementById("interim");
let recognition = null, listening = false;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SR) {
  recognition = new SR();
  recognition.lang = "es-ES"; recognition.continuous = false; recognition.interimResults = true;
  recognition.onstart  = () => { listening=true; micBtn.classList.add("recording"); };
  recognition.onend    = () => { listening=false; micBtn.classList.remove("recording"); interim.textContent=""; };
  recognition.onerror  = () => { listening=false; micBtn.classList.remove("recording"); interim.textContent=""; };
  recognition.onresult = e => {
    let f="", i="";
    for (const r of e.results) { if(r.isFinal) f+=r[0].transcript; else i+=r[0].transcript; }
    interim.textContent = i||f;
    if (f) { interim.textContent=""; send(f.trim()); }
  };
  micBtn.addEventListener("click", () => { if(listening) recognition.stop(); else recognition.start(); });
} else {
  micBtn.style.opacity = "0.3"; micBtn.style.cursor = "not-allowed";
  addMsg("Usá Chrome para reconocimiento de voz.", "sys");
}

// WebSocket
let ws=null, reconnTimer=null;
function connectWS() {
  if (ws && ws.readyState < 2) return;
  try { ws = new WebSocket(WS_URL); } catch(e) { schedule(); return; }
  const dot = document.getElementById("ws-dot");
  const sts = document.getElementById("ws-status");
  ws.onopen = () => {
    dot.classList.add("ok"); sts.textContent="conectado";
    if(reconnTimer){clearTimeout(reconnTimer);reconnTimer=null;}
    ws.send(JSON.stringify({type:"get_status"}));
  };
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type==="state_change"||msg.type==="status") setUIState(msg.state);
      else if (msg.type==="response") addMsg(msg.text, "vexa");
    } catch(_){}
  };
  ws.onclose = () => { dot.classList.remove("ok"); sts.textContent="desconectado"; schedule(); };
}
function schedule() { if(!reconnTimer) reconnTimer=setTimeout(connectWS,3000); }

setInterval(async()=>{
  if(ws&&ws.readyState===1) return;
  try { const r=await fetch(`${API_URL}/status`); const d=await r.json(); setUIState(d.state); } catch(_){}
},3000);

connectWS();
fetch(`${API_URL}/status`)
  .then(r=>r.json())
  .then(d=>{ setUIState(d.state); addMsg(`VEXA online — ${d.state}`, "sys"); })
  .catch(()=>addMsg("VEXA offline. Iniciala con: ia vexa start","sys"));
</script>
</body>
</html>
