<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEXA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-state="IDLE">

  <!-- Fondo partículas -->
  <canvas id="bg-canvas"></canvas>

  <!-- Layout principal -->
  <div class="layout">

    <!-- ── Top bar ── -->
    <header class="topbar">
      <div class="topbar-logo">
        <span class="logo-v">V</span><span class="logo-exa">EXA</span>
      </div>
      <div class="topbar-center">
        <div class="state-pill" id="state-pill">
          <span class="state-dot" id="state-dot"></span>
          <span class="state-text" id="state-text">EN ESPERA</span>
        </div>
      </div>
      <div class="topbar-right">
        <span class="clock" id="clock"></span>
        <div class="ws-indicator" id="ws-indicator" title="WebSocket"></div>
      </div>
    </header>

    <!-- ── Main ── -->
    <main class="main">

      <!-- Orb lateral -->
      <aside class="orb-panel">
        <canvas id="sphere" width="260" height="260"></canvas>
        <div class="orb-label" id="orb-label">EN ESPERA</div>
        <div class="orb-stats">
          <div class="stat-row">
            <span class="stat-key">MODELO</span>
            <span class="stat-val" id="stat-model">llama3.2:1b</span>
          </div>
          <div class="stat-row">
            <span class="stat-key">MODO</span>
            <span class="stat-val" id="stat-mode">CHAT</span>
          </div>
        </div>
        <div class="quick-actions">
          <button class="qa-btn" onclick="sendCommand('modo chat')">CHAT</button>
          <button class="qa-btn" onclick="sendCommand('modo pc')">PC</button>
          <button class="qa-btn" onclick="sendCommand('modo agente')">AGENTE</button>
          <button class="qa-btn qa-stop" onclick="sendCommand('para')">STOP</button>
        </div>
      </aside>

      <!-- Chat history -->
      <section class="chat-section">
        <div class="chat-header">
          <span class="chat-title">CONVERSACIÓN</span>
          <button class="clear-btn" onclick="clearChat()" title="Limpiar historial">LIMPIAR</button>
        </div>
        <div class="chat-box" id="chat-box">
          <div class="msg sys">Sistema VEXA iniciado. Hablá o escribí un comando.</div>
        </div>
        <!-- Input -->
        <div class="input-area">
          <div class="input-wrap">
            <input
              type="text"
              id="cmd-input"
              class="cmd-input"
              placeholder="Escribe un comando o pregunta..."
              autocomplete="off"
              spellcheck="false"
            />
            <button class="mic-btn" id="mic-btn" title="Mantener para hablar">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/>
                <path d="M19 11a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.92V20H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-2.08A7 7 0 0 0 19 11z"/>
              </svg>
            </button>
            <button class="send-btn" id="btn-send">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
              </svg>
            </button>
          </div>
          <div class="interim-text" id="interim-text"></div>
        </div>
      </section>

    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
